stages:
  - lint
  - test
  - frontend
  - docs-lint
  - build
  - deploy

variables:
  POSTGRES_DB: rpgdb
  POSTGRES_USER: rpguser
  POSTGRES_PASSWORD: rpgpass
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  DJANGO_SETTINGS_MODULE: core.settings.base

lint-backend:
  image: python:3.11
  stage: lint
  script:
    - python -m pip install --upgrade pip
    - python -m pip install --no-cache-dir flake8 black
    - python -m black --check backend
    - python -m flake8 backend
pytest-backend:
  image: python:3.11
  stage: test
  needs: [lint-backend]
  services:
    - name: postgres:15
      alias: postgres
    - name: redis:7
      alias: redis
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  before_script:
    - apt-get update && apt-get install -y build-essential libpq-dev gcc
    - python -m pip install --upgrade pip
    - python -m pip install --no-cache-dir -r backend/requirements.txt
    - python -m pip install --no-cache-dir pytest pytest-django psycopg2-binary coverage pytest-cov
    # wait for postgres to accept connections
    - python backend/scripts/wait_for_postgres.py
    - cd backend
    - python manage.py migrate --noinput
  script:
    # we `cd backend` in before_script, so write reports to ../backend to match artifact paths
    - python -m pytest --junitxml=../backend/pytest-results.xml --cov=backend --cov-report=term --cov-report=xml:../backend/coverage.xml -q
  coverage: '/TOTAL.*\s+(\d+\%)/'
  artifacts:
    when: always
    reports:
      junit: backend/pytest-results.xml
    paths:
      - backend/pytest-results.xml
      - backend/coverage.xml
      - .cache/pip
    expire_in: 1 hour

frontend-ci:
  image: node:20
  stage: frontend
  variables:
    HUSKY: "0"
  before_script:
    - cd frontend
  script:
    - |
      if [ -f package-lock.json ]; then
        npm ci
      else
        npm install --no-audit --no-fund
      fi
    - npm run lint
    - npm run build
  artifacts:
    paths:
      - frontend/.next
    expire_in: 1 hour

upload-coverage-codecov:
  image: python:3.11
  stage: test
  needs:
    - job: pytest-backend
      artifacts: true
  variables:
    GIT_STRATEGY: none
  script:
    - apt-get update && apt-get install -y curl
    - |
      # safe check: print whether CODECOV_TOKEN is set and its length (do not print the token)
      if [ -n "$CODECOV_TOKEN" ]; then
        echo "CODECOV_TOKEN is set, length: ${#CODECOV_TOKEN}"
      else
        echo "CODECOV_TOKEN is not set"
      fi
    - |
      if [ -f backend/coverage.xml ]; then
        echo "coverage.xml exists, uploading..."
        ls -la backend || true
        bash <(curl -s https://codecov.io/bash) -f backend/coverage.xml || true
      else
        echo "coverage.xml not found, skipping codecov upload"
      fi
  when: always

flake8-docstrings-baseline:
  image: python:3.11
  stage: docs-lint
  needs: [lint-backend]
  script:
    - python -m pip install --upgrade pip
    - python -m pip install --no-cache-dir flake8 flake8-docstrings
    # run flake8 with docstring checks and save output to artifact; do not fail pipeline
    - python -m flake8 backend --select=D100,D101,D102,D103,D104,D105,D106 --format=default | tee docstring-report.txt || true
  artifacts:
    when: always
    paths:
      - docstring-report.txt
    expire_in: 1 hour

build-backend-image:
  image: docker:20
  stage: build
  services:
    - name: docker:20-dind
      alias: docker
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - |
      set -euo pipefail
      # Always build a local image and save it as artifact
      LOCAL_IMAGE="backend-ci:$CI_COMMIT_SHORT_SHA"
      echo "Building local image $LOCAL_IMAGE"
      docker build -t "$LOCAL_IMAGE" ./backend
      echo "Saving artifact backend_image.tar"
      docker save -o backend_image.tar "$LOCAL_IMAGE" || true

      # If registry credentials provided, also tag and push to remote
      if [ -n "${DOCKER_REGISTRY:-}" ] && [ -n "${DOCKER_USERNAME:-}" ] && [ -n "${DOCKER_PASSWORD:-}" ]; then
        echo "Logging into registry $DOCKER_REGISTRY";
        echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin "$DOCKER_REGISTRY";
        REMOTE_IMAGE="$DOCKER_REGISTRY/$CI_PROJECT_PATH/backend:$CI_COMMIT_SHORT_SHA";
        echo "Tagging $LOCAL_IMAGE as $REMOTE_IMAGE";
        docker tag "$LOCAL_IMAGE" "$REMOTE_IMAGE";
        echo "Pushing $REMOTE_IMAGE";
        for i in 1 2 3; do
          docker push "$REMOTE_IMAGE" && break || (echo "Push failed, retrying ($i)..." && sleep 3);
        done
      else
        echo "Registry credentials not set; skipping push"
      fi
  artifacts:
    when: always
    paths:
      - backend_image.tar
    expire_in: 1 hour
  rules:
    - when: on_success
  retry: 2

deploy-staging:
  image: alpine:3.18
  stage: deploy
  before_script:
    - apk add --no-cache openssh-client bash curl
  variables:
    DEMO_SEED: "false"
    ALLOW_DEMO_SEED: "false"
  script:
    - |
      if [ -n "$DEPLOY_HOST" ] && [ -n "$SSH_PRIVATE_KEY" ] && [ -n "$DEPLOY_USER" ]; then
        echo "Starting SSH deploy to $DEPLOY_USER@$DEPLOY_HOST";
        eval $(ssh-agent -s);
        echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null;
        mkdir -p ~/.ssh;
        printf "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config;
        # pull image if registry set
        if [ -n "$DOCKER_REGISTRY" ]; then
          IMAGE="$DOCKER_REGISTRY/$CI_PROJECT_PATH/backend:$CI_COMMIT_SHORT_SHA";
          ssh $DEPLOY_USER@$DEPLOY_HOST "docker pull $IMAGE || true";
        else
          IMAGE="";
        fi
        # remote deploy commands: user can customize this section
        # If DEPLOY_DIR is set, run docker-compose there and migrate
        if [ -n "$DEPLOY_DIR" ]; then
          ssh $DEPLOY_USER@$DEPLOY_HOST "cd $DEPLOY_DIR && \
            if [ -n '$IMAGE' ]; then docker pull $IMAGE || true; fi && \
            docker-compose pull || true && \
            docker-compose up -d && \
            # attempt migrations if compose service is named 'backend'
            docker-compose exec backend python manage.py migrate --noinput || true && \
            if [ '${DEMO_SEED}' = 'true' ]; then \
              echo 'Seeding demo data on staging...'; \
              docker-compose exec -e ALLOW_DEMO_SEED=${ALLOW_DEMO_SEED} backend python manage.py load_demo_content || true; \
              docker-compose exec -e ALLOW_DEMO_SEED=${ALLOW_DEMO_SEED} backend python manage.py create_demo_superuser || true; \
              docker-compose exec backend python manage.py print_demo_summary || true; \
            else \
              echo 'DEMO_SEED=false -> skipping demo seeding on staging'; \
            fi";
        else
          ssh $DEPLOY_USER@$DEPLOY_HOST "docker-compose pull || true && docker-compose up -d && echo 'Deploy executed'";
        fi
        echo "Подробнее: см. README.deploy.md в репозитории";
      else
        echo "DEPLOY_HOST/DEPLOY_USER/SSH_PRIVATE_KEY not set - skipping deploy";
      fi
  when: manual
  only:
    - main

# Smoke test the pushed image by running it and hitting /healthz
smoke-test-image:
  image: docker:20
  stage: build
  services:
    - name: docker:20-dind
      alias: docker
  variables:
    DOCKER_TLS_CERTDIR: ""
    GIT_STRATEGY: none
  needs:
    - job: build-backend-image
      artifacts: true
  script:
    - |
      set -euo pipefail
      IMAGE=""
      # Try remote pull if registry creds provided
      if [ -n "${DOCKER_REGISTRY:-}" ] && [ -n "${DOCKER_USERNAME:-}" ] && [ -n "${DOCKER_PASSWORD:-}" ]; then
        echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin "$DOCKER_REGISTRY" || true
        CANDIDATE_IMAGE="$DOCKER_REGISTRY/$CI_PROJECT_PATH/backend:$CI_COMMIT_SHORT_SHA"
        echo "Attempting to pull $CANDIDATE_IMAGE"
        if docker pull "$CANDIDATE_IMAGE"; then
          IMAGE="$CANDIDATE_IMAGE"
        else
          echo "Remote pull failed; will fallback to artifact if available"
        fi
      fi

      if [ -z "$IMAGE" ]; then
        if [ -f backend_image.tar ]; then
          echo "Loading image from artifact backend_image.tar"
          docker load -i backend_image.tar || (echo "Failed to load image" && exit 1)
          IMAGE="backend-ci:$CI_COMMIT_SHORT_SHA"
        else
          echo "No remote image and no artifact found; skipping smoke test"
          exit 0
        fi
      fi
      CONTAINER_ID=$(docker run -d -p 8001:8000 "$IMAGE") || (echo "Failed to start container" && exit 1);
      echo "Started container $CONTAINER_ID, waiting for health...";
      for i in {1..20}; do
        if curl -sS --fail http://localhost:8001/healthz > /dev/null; then
          echo "smoke test passed"; break;
        fi; sleep 1;
      done
      docker rm -f "$CONTAINER_ID" || true
  rules:
    - when: on_success
  retry: 2

deploy-local:
  image: docker:20
  stage: deploy
  tags: [local]
  needs:
    - job: build-backend-image
      artifacts: true
  variables:
    GIT_STRATEGY: none
    # Use host Docker daemon via unix socket (runner must mount /var/run/docker.sock)
    DOCKER_HOST: "unix:///var/run/docker.sock"
    DOCKER_TLS_CERTDIR: ""
    # Seed demo data in local deploy
    DEMO_SEED: "true"
    ALLOW_DEMO_SEED: "true"
    # Demo admin defaults (can override in CI variables)
    DEMO_ADMIN_USERNAME: "admin"
    DEMO_ADMIN_EMAIL: "admin@example.com"
    DEMO_ADMIN_PASSWORD: "admin123"
  script:
    - |
      set -euo pipefail
      echo "Checking Docker connectivity..."
      if [ ! -S /var/run/docker.sock ]; then
        echo "ERROR: /var/run/docker.sock is not available inside the job container.";
        echo "Make sure your local GitLab Runner (docker executor) mounts the socket with:";
        echo "  volumes = [\"/var/run/docker.sock:/var/run/docker.sock\"] in config.toml";
        exit 1;
      fi
      docker version || (echo "ERROR: Cannot talk to Docker daemon" && exit 1)

      # Self-contained local stack: create network, (re)start redis/postgres, run migrations & static, then backend and celery
      NET="ci_local_net"
      echo "Ensuring network $NET exists"
      docker network inspect "$NET" >/dev/null 2>&1 || docker network create "$NET"

      echo "Starting/refreshing Redis (ci_local_redis)"
      docker rm -f ci_local_redis >/dev/null 2>&1 || true
      docker run -d --name ci_local_redis --network "$NET" redis:7 >/dev/null

      echo "Starting/refreshing Postgres (ci_local_postgres)"
      docker rm -f ci_local_postgres >/dev/null 2>&1 || true
      docker run -d --name ci_local_postgres --network "$NET" \
        -e POSTGRES_DB="${POSTGRES_DB:-rpgdb}" \
        -e POSTGRES_USER="${POSTGRES_USER:-rpguser}" \
        -e POSTGRES_PASSWORD="${POSTGRES_PASSWORD:-rpgpass}" \
        postgres:15 >/dev/null

      echo "Waiting for Postgres to be ready..."
      for i in $(seq 1 30); do
        if docker exec ci_local_postgres pg_isready -U "${POSTGRES_USER:-rpguser}" -d "${POSTGRES_DB:-rpgdb}" -h localhost >/dev/null 2>&1; then
          echo "Postgres is ready"; break; fi; sleep 1; done

      if [ -f backend_image.tar ]; then
        echo "Loading backend_image.tar";
        docker load -i backend_image.tar >/dev/null;
        IMAGE="backend-ci:$CI_COMMIT_SHORT_SHA";
        echo "Running migrations and collectstatic"
        docker run --rm --network "$NET" \
          -e DJANGO_SETTINGS_MODULE="${DJANGO_SETTINGS_MODULE:-core.settings.base}" \
          -e POSTGRES_HOST="ci_local_postgres" \
          -e POSTGRES_DB="${POSTGRES_DB:-rpgdb}" \
          -e POSTGRES_USER="${POSTGRES_USER:-rpguser}" \
          -e POSTGRES_PASSWORD="${POSTGRES_PASSWORD:-rpgpass}" \
          -e REDIS_URL="redis://ci_local_redis:6379/0" \
          "$IMAGE" bash -lc "python manage.py migrate --noinput && python manage.py collectstatic --noinput" >/dev/null

        if [ "${DEMO_SEED}" = "true" ]; then
          echo "Loading demo content and creating demo superuser"
          docker run --rm --network "$NET" \
            -e DJANGO_SETTINGS_MODULE="${DJANGO_SETTINGS_MODULE:-core.settings.base}" \
            -e POSTGRES_HOST="ci_local_postgres" \
            -e POSTGRES_DB="${POSTGRES_DB:-rpgdb}" \
            -e POSTGRES_USER="${POSTGRES_USER:-rpguser}" \
            -e POSTGRES_PASSWORD="${POSTGRES_PASSWORD:-rpgpass}" \
            -e REDIS_URL="redis://ci_local_redis:6379/0" \
            -e DEMO_ADMIN_USERNAME="$DEMO_ADMIN_USERNAME" \
            -e DEMO_ADMIN_EMAIL="$DEMO_ADMIN_EMAIL" \
            -e DEMO_ADMIN_PASSWORD="$DEMO_ADMIN_PASSWORD" \
            -e ALLOW_DEMO_SEED="$ALLOW_DEMO_SEED" \
            "$IMAGE" bash -lc "python manage.py load_demo_content && python manage.py create_demo_superuser && python manage.py print_demo_summary" >/dev/null || true
        else
          echo "DEMO_SEED=false -> skipping demo seeding"
        fi

        echo "Stopping/removing existing ci_local_backend if present";
        docker rm -f ci_local_backend >/dev/null 2>&1 || true;
        echo "Running backend $IMAGE (detached) on network $NET"
        docker run -d --name ci_local_backend --network "$NET" -p 8000:8000 \
          -e DJANGO_SETTINGS_MODULE="${DJANGO_SETTINGS_MODULE:-core.settings.base}" \
          -e POSTGRES_HOST="ci_local_postgres" \
          -e POSTGRES_DB="${POSTGRES_DB:-rpgdb}" \
          -e POSTGRES_USER="${POSTGRES_USER:-rpguser}" \
          -e POSTGRES_PASSWORD="${POSTGRES_PASSWORD:-rpgpass}" \
          -e REDIS_URL="redis://ci_local_redis:6379/0" \
          "$IMAGE" >/dev/null || true;

        echo "Starting Celery worker (ci_local_celery)"
        docker rm -f ci_local_celery >/dev/null 2>&1 || true
        docker run -d --name ci_local_celery --network "$NET" \
          -e DJANGO_SETTINGS_MODULE="${DJANGO_SETTINGS_MODULE:-core.settings.base}" \
          -e POSTGRES_HOST="ci_local_postgres" \
          -e POSTGRES_DB="${POSTGRES_DB:-rpgdb}" \
          -e POSTGRES_USER="${POSTGRES_USER:-rpguser}" \
          -e POSTGRES_PASSWORD="${POSTGRES_PASSWORD:-rpgpass}" \
          -e REDIS_URL="redis://ci_local_redis:6379/0" \
          "$IMAGE" bash -lc "celery -A core worker -l info" >/dev/null

        echo "Waiting for backend health on http://localhost:8000/healthz"
        for i in $(seq 1 30); do
          if curl -sS --fail http://localhost:8000/healthz >/dev/null; then echo "Backend healthy"; break; fi; sleep 1; done
        echo "Backend started locally on http://localhost:8000";
        echo "Admin login: ${DEMO_ADMIN_USERNAME}/${DEMO_ADMIN_PASSWORD} (if DEMO_SEED=true)";
        echo "Подробнее: см. README.deploy.md в репозитории";
      else
        echo "backend_image.tar artifact not found; nothing to deploy";
      fi
  when: manual
